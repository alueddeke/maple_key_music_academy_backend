name: Deploy Backend Prod
on:
  push:
    branches:
      - production
  pull_request:
    branches:
      - production
  workflow_dispatch:
jobs:
  # test:
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v4
  #
  #     - name: Set up Python
  #       uses: actions/setup-python@v5
  #       with:
  #         python-version: '3.11'
  #
  #     - name: Cache pip dependencies
  #       uses: actions/cache@v3
  #       with:
  #         path: ~/.cache/pip
  #         key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
  #         restore-keys: |
  #           ${{ runner.os }}-pip-
  #
  #     - name: Install dependencies
  #       run: |
  #         python -m pip install --upgrade pip
  #         pip install -r requirements.txt
  build_and_push:
    # needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/maple-key-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/maple-key-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
  deploy:
    needs: build_and_push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Deploy to VPC
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPC_HOST }}
          username: ${{ secrets.VPC_USERNAME }}
          key: ${{ secrets.VPC_SSH_KEY }}
          port: ${{ secrets.VPC_PORT || 22 }}
          script: |
            set -e

            # Login to Docker Hub
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

            # Ensure volumes and network exist
            docker volume create postgres_data || true
            docker volume create static_volume || true
            docker network create maple-key-network || true

            # Pull new image BEFORE touching any running container
            docker pull ${{ secrets.DOCKER_USERNAME }}/maple-key-backend:latest

            # ===== ENSURE POSTGRES IS RUNNING =====
            # Reuse the existing container if healthy — don't restart it unnecessarily.
            # Only start a fresh postgres if the container is absent or stopped.
            if ! docker ps --filter "name=^postgres$" --filter "status=running" -q | grep -q .; then
              echo "PostgreSQL not running — starting..."
              docker rm postgres 2>/dev/null || true
              docker run -d \
                --name postgres \
                --restart unless-stopped \
                --network maple-key-network \
                -e POSTGRES_USER="${{ secrets.POSTGRES_USER }}" \
                -e POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}" \
                -e POSTGRES_DB="${{ secrets.POSTGRES_DB }}" \
                -v postgres_data:/var/lib/postgresql/data \
                postgres:15
              echo "Waiting for PostgreSQL to be ready..."
              sleep 10
            else
              echo "PostgreSQL already running — reusing existing instance"
            fi

            # Verify postgres is reachable
            docker run --rm --network maple-key-network postgres:15 \
              pg_isready -h postgres -U ${{ secrets.POSTGRES_USER }} \
              || { echo "❌ Cannot reach PostgreSQL — aborting"; exit 1; }

            # ===== MIGRATION GATE =====
            # Runs against the LIVE database BEFORE stopping any running container.
            # If this fails, production keeps serving traffic unchanged.
            echo "========================================="
            echo "Running database migrations..."
            echo "========================================="
            if ! docker run --rm \
              --network maple-key-network \
              -e DATABASE_URL="postgresql://${{ secrets.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@postgres:5432/${{ secrets.POSTGRES_DB }}" \
              -e SECRET_KEY="${{ secrets.DJANGO_SECRET_KEY }}" \
              -e DEBUG="False" \
              -e ALLOWED_HOSTS="${{ secrets.ALLOWED_HOSTS }}" \
              -e GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}" \
              -e GOOGLE_CLIENT_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}" \
              -e CORS_ALLOWED_ORIGINS="${{ secrets.CORS_ALLOWED_ORIGINS }}" \
              -e FRONTEND_URL="${{ secrets.FRONTEND_URL }}" \
              -e RESEND_API_KEY="${{ secrets.RESEND_API_KEY }}" \
              -e DEFAULT_FROM_EMAIL="${{ secrets.DEFAULT_FROM_EMAIL }}" \
              ${{ secrets.DOCKER_USERNAME }}/maple-key-backend:latest \
              python manage.py migrate; then
              echo "========================================="
              echo "❌ MIGRATION FAILED — deploy aborted"
              echo "Production is unchanged and still serving traffic."
              echo "========================================="
              exit 1
            fi
            echo "✅ Migrations completed successfully"

            # Verify no unapplied migrations remain
            if ! docker run --rm \
              --network maple-key-network \
              -e DATABASE_URL="postgresql://${{ secrets.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@postgres:5432/${{ secrets.POSTGRES_DB }}" \
              -e SECRET_KEY="${{ secrets.DJANGO_SECRET_KEY }}" \
              -e DEBUG="False" \
              -e ALLOWED_HOSTS="${{ secrets.ALLOWED_HOSTS }}" \
              -e GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}" \
              -e GOOGLE_CLIENT_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}" \
              -e CORS_ALLOWED_ORIGINS="${{ secrets.CORS_ALLOWED_ORIGINS }}" \
              -e FRONTEND_URL="${{ secrets.FRONTEND_URL }}" \
              -e RESEND_API_KEY="${{ secrets.RESEND_API_KEY }}" \
              -e DEFAULT_FROM_EMAIL="${{ secrets.DEFAULT_FROM_EMAIL }}" \
              ${{ secrets.DOCKER_USERNAME }}/maple-key-backend:latest \
              python manage.py migrate --check; then
              echo "❌ Unapplied migrations detected after migrate run — deploy aborted"
              exit 1
            fi
            echo "✅ All migrations verified as applied"

            # ===== SAFE TO SWAP CONTAINERS =====
            # Migrations passed. Capture current image for rollback before touching anything.
            OLD_IMAGE=$(docker inspect maple-key-backend --format='{{.Config.Image}}' 2>/dev/null || echo "")
            echo "Old image for rollback: ${OLD_IMAGE:-none}"

            # Collect static files (throwaway container, postgres still running)
            docker run --rm \
              --network maple-key-network \
              -e DATABASE_URL="postgresql://${{ secrets.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@postgres:5432/${{ secrets.POSTGRES_DB }}" \
              -e SECRET_KEY="${{ secrets.DJANGO_SECRET_KEY }}" \
              -e DEBUG="False" \
              -e ALLOWED_HOSTS="${{ secrets.ALLOWED_HOSTS }}" \
              -e GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}" \
              -e GOOGLE_CLIENT_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}" \
              -e CORS_ALLOWED_ORIGINS="${{ secrets.CORS_ALLOWED_ORIGINS }}" \
              -e FRONTEND_URL="${{ secrets.FRONTEND_URL }}" \
              -e RESEND_API_KEY="${{ secrets.RESEND_API_KEY }}" \
              -e DEFAULT_FROM_EMAIL="${{ secrets.DEFAULT_FROM_EMAIL }}" \
              -v static_volume:/app/staticfiles \
              ${{ secrets.DOCKER_USERNAME }}/maple-key-backend:latest \
              python manage.py collectstatic --noinput

            # Swap backend container (postgres stays running throughout)
            docker stop maple-key-backend 2>/dev/null || true
            docker rm maple-key-backend 2>/dev/null || true

            docker run -d \
              --name maple-key-backend \
              --restart unless-stopped \
              --network maple-key-network \
              -p 127.0.0.1:8001:8000 \
              -e DATABASE_URL="postgresql://${{ secrets.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@postgres:5432/${{ secrets.POSTGRES_DB }}" \
              -e SECRET_KEY="${{ secrets.DJANGO_SECRET_KEY }}" \
              -e DEBUG="False" \
              -e ALLOWED_HOSTS="${{ secrets.ALLOWED_HOSTS }}" \
              -e GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}" \
              -e GOOGLE_CLIENT_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}" \
              -e CORS_ALLOWED_ORIGINS="${{ secrets.CORS_ALLOWED_ORIGINS }}" \
              -e FRONTEND_URL="${{ secrets.FRONTEND_URL }}" \
              -e RESEND_API_KEY="${{ secrets.RESEND_API_KEY }}" \
              -e DEFAULT_FROM_EMAIL="${{ secrets.DEFAULT_FROM_EMAIL }}" \
              -v static_volume:/app/staticfiles \
              ${{ secrets.DOCKER_USERNAME }}/maple-key-backend:latest

            # ===== HEALTH CHECK WITH ROLLBACK =====
            # Poll /api/auth/user/ directly on port 8001 (loopback-bound, bypasses nginx).
            # Expects 401 (auth required) meaning Django/gunicorn is up.
            echo "Health checking new backend (30s window)..."
            HEALTHY=false
            for i in $(seq 1 6); do
              sleep 5
              HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8001/api/auth/user/ 2>/dev/null || echo "000")
              if [ "$HTTP_STATUS" = "401" ] || [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "301" ]; then
                HEALTHY=true
                echo "✅ Backend healthy (HTTP $HTTP_STATUS) after $((i * 5))s"
                break
              fi
              echo "  Attempt $i/6: HTTP $HTTP_STATUS — waiting..."
            done

            if [ "$HEALTHY" = "false" ]; then
              echo "========================================="
              echo "❌ Health check failed — rolling back"
              echo "========================================="
              echo "Failed container logs:"
              docker logs maple-key-backend --tail 50 2>/dev/null || true
              docker stop maple-key-backend 2>/dev/null || true
              docker rm maple-key-backend 2>/dev/null || true
              if [ -n "$OLD_IMAGE" ]; then
                echo "Restoring previous image: $OLD_IMAGE"
                docker run -d \
                  --name maple-key-backend \
                  --restart unless-stopped \
                  --network maple-key-network \
                  -e DATABASE_URL="postgresql://${{ secrets.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@postgres:5432/${{ secrets.POSTGRES_DB }}" \
                  -e SECRET_KEY="${{ secrets.DJANGO_SECRET_KEY }}" \
                  -e DEBUG="False" \
                  -e ALLOWED_HOSTS="${{ secrets.ALLOWED_HOSTS }}" \
                  -e GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}" \
                  -e GOOGLE_CLIENT_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}" \
                  -e CORS_ALLOWED_ORIGINS="${{ secrets.CORS_ALLOWED_ORIGINS }}" \
                  -e FRONTEND_URL="${{ secrets.FRONTEND_URL }}" \
                  -e RESEND_API_KEY="${{ secrets.RESEND_API_KEY }}" \
                  -e DEFAULT_FROM_EMAIL="${{ secrets.DEFAULT_FROM_EMAIL }}" \
                  -v static_volume:/app/staticfiles \
                  "$OLD_IMAGE"
                echo "⚠️  Rolled back to $OLD_IMAGE — production restored"
              else
                echo "⚠️  No previous image to roll back to — manual intervention required"
              fi
              exit 1
            fi

            # Swap nginx (backend is healthy, safe to briefly interrupt nginx)
            docker stop nginx 2>/dev/null || true
            docker rm nginx 2>/dev/null || true

            cat > /tmp/nginx.conf << 'EOF'
            server {
                listen 80;
                server_name _;
                client_max_body_size 10M;

                # Serve static files
                location /static/ {
                    alias /usr/share/nginx/html/static/;
                    expires 30d;
                    add_header Cache-Control "public, immutable";
                }

                # Serve media files
                location /media/ {
                    alias /usr/share/nginx/html/media/;
                    expires 30d;
                }

                # Proxy all other requests to Django
                location / {
                    proxy_pass http://maple-key-backend:8000;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    # Preserve X-Forwarded-Proto from Host Nginx (if set), otherwise use $scheme
                    # This allows SSL termination at Host Nginx to work correctly
                    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
                    proxy_redirect off;
                    proxy_buffering off;
                }
            }
            EOF

            docker run -d \
              --name nginx \
              --restart unless-stopped \
              --network maple-key-network \
              -p 8000:80 \
              -v /tmp/nginx.conf:/etc/nginx/conf.d/default.conf:ro \
              -v static_volume:/usr/share/nginx/html/static:ro \
              nginx:alpine

            # ===== SETUP HOST NGINX =====
            echo "Setting up host Nginx..."

            # Install Nginx if not already installed
            if ! command -v nginx &> /dev/null; then
              echo "Installing Nginx..."
              sudo apt update
              sudo apt install -y nginx
            fi

            # Install Certbot for SSL certificates
            if ! command -v certbot &> /dev/null; then
              echo "Installing Certbot..."
              sudo apt update
              sudo apt install -y certbot python3-certbot-nginx
            fi

            # Enable and start Nginx
            sudo systemctl enable nginx
            sudo systemctl start nginx

            # Create Nginx configuration for api.maplekeymusic.com (only if it doesn't exist)
            # Note: Certbot will automatically add SSL configuration and HTTPS redirect
            # We don't overwrite if file exists to preserve SSL config
            if [ ! -f /etc/nginx/sites-available/api.maplekeymusic.com ]; then
              sudo tee /etc/nginx/sites-available/api.maplekeymusic.com > /dev/null <<'NGINX_EOF'
            server {
                listen 80;
                server_name api.maplekeymusic.com;
                client_max_body_size 10M;

                location / {
                    proxy_pass http://localhost:8000;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                    proxy_redirect off;

                    # WebSocket support (if needed in the future)
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection "upgrade";
                }
            }
            NGINX_EOF
            fi

            # Enable the site
            sudo ln -sf /etc/nginx/sites-available/api.maplekeymusic.com /etc/nginx/sites-enabled/

            # Remove default site if it exists
            sudo rm -f /etc/nginx/sites-enabled/default

            # Test Nginx configuration
            sudo nginx -t

            # Reload Nginx
            sudo systemctl reload nginx

            # ===== SETUP SSL WITH CERTBOT =====
            echo "Setting up SSL certificate..."

            # Check if certificate already exists
            if ! sudo certbot certificates 2>/dev/null | grep -q "api.maplekeymusic.com"; then
              echo "Obtaining new SSL certificate from Let's Encrypt..."
              sudo certbot --nginx \
                --non-interactive \
                --agree-tos \
                --redirect \
                --email ${{ secrets.CERTBOT_EMAIL }} \
                -d api.maplekeymusic.com
              echo "✅ SSL certificate obtained and configured!"
            else
              echo "SSL certificate already exists. Checking for renewal..."
              sudo certbot renew --quiet
              echo "✅ SSL certificate is up to date!"
            fi

            # Configure firewall
            sudo ufw allow 80/tcp || true
            sudo ufw allow 443/tcp || true

            echo "✅ Host Nginx configured for api.maplekeymusic.com"

            # Clean up old images
            docker image prune -f

            # Final verification
            sleep 3
            if docker ps | grep -q maple-key-backend && docker ps | grep -q postgres && docker ps | grep -q nginx; then
              echo "✅ Backend, PostgreSQL, and Nginx deployed successfully!"
              FINAL_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api.maplekeymusic.com/api/auth/user/ 2>/dev/null || echo "000")
              echo "Final API health check: HTTP $FINAL_STATUS (expect 401)"
              if [ "$FINAL_STATUS" != "401" ] && [ "$FINAL_STATUS" != "200" ]; then
                echo "⚠️  API not returning expected status — check logs: docker logs maple-key-backend"
              fi
            else
              echo "❌ Container check failed!"
              docker logs maple-key-backend --tail 30 2>/dev/null || true
              exit 1
            fi
